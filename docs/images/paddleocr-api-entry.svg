<svg xmlns="http://www.w3.org/2000/svg" width="1435" height="768" viewBox="0 0 1435 768" role="img" aria-label="PaddleOCR API entry guide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf4ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ff3b30"/>
    </marker>
  </defs>

  <rect width="1435" height="768" fill="url(#bg)"/>
  <rect x="0" y="0" width="1435" height="40" fill="#161616"/>
  <rect x="14" y="8" width="530" height="24" rx="12" fill="#2a2a2a"/>
  <text x="48" y="25" font-family="Arial, sans-serif" font-size="15" fill="#ffffff">https://aistudio.baidu.com/paddleocr</text>
  <circle cx="28" cy="20" r="7" fill="none" stroke="#cbd5e1" stroke-width="1.4"/>

  <rect x="0" y="40" width="1435" height="60" fill="#ffffff"/>
  <text x="42" y="77" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2a60">PaddleOCR</text>

  <text x="454" y="255" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#1273e6">文档解析的事，交给 PaddleOCR</text>
  <text x="647" y="314" font-family="Arial, sans-serif" font-size="22" fill="#334155">支持多语言识别，高效准确解析文档内容</text>

  <g filter="url(#shadow)">
    <rect x="610" y="351" width="140" height="43" rx="8" fill="#f8fbff" stroke="#111827"/>
    <text x="671" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">GitHub</text>
    <rect x="772" y="351" width="140" height="43" rx="8" fill="#f8fbff" stroke="#111827"/>
    <text x="842" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">MCP</text>
    <rect x="934" y="351" width="140" height="43" rx="8" fill="#f8fbff" stroke="#111827"/>
    <text x="1004" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">API</text>
  </g>

  <rect x="373" y="443" width="938" height="264" rx="20" fill="#ffffff" fill-opacity="0.56" stroke="#94a3b8" stroke-dasharray="4 4"/>
  <rect x="821" y="489" width="42" height="34" rx="6" fill="#4f6bff"/>
  <text x="842" y="512" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">↑</text>
  <text x="742" y="556" font-family="Arial, sans-serif" font-size="16" fill="#334155">点击上传或拖入文件开始解析</text>
  <text x="709" y="585" font-family="Arial, sans-serif" font-size="13" fill="#64748b">支持 PDF / PNG / JPG / BMP / TIFF 等格式</text>

  <path d="M1004 351 C1105 276, 1190 255, 1267 220" fill="none" stroke="#ff3b30" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="1128" y="145" width="250" height="76" rx="16" fill="#ffffff" stroke="#ff3b30" stroke-width="3"/>
  <text x="1253" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b91c1c">第一步：点击 API</text>
  <text x="1253" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">进入调用示例和令牌页面</text>

  <rect x="38" y="118" width="304" height="90" rx="16" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="190" y="151" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#1d4ed8">访问地址</text>
  <text x="190" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334155">https://aistudio.baidu.com/paddleocr</text>
</svg>
