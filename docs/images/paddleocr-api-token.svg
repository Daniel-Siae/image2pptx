<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="760" viewBox="0 0 1060 760" role="img" aria-label="PaddleOCR async JOB_URL and token guide">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1060" height="760" fill="#ffffff"/>

  <rect x="30" y="24" width="18" height="18" rx="4" fill="#4f46e5"/>
  <path d="M35 33 L39 37 L45 28" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="62" y="40" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#111827">使用我的 AI Studio 访问令牌</text>
  <text x="30" y="88" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#475569">AI Studio 访问令牌属于个人账户的重要隐私，请谨慎管理，切勿随意对外公开。</text>
  <text x="650" y="88" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#2563eb">点击获取令牌</text>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="19" fill="#1f2937">
    <text x="30" y="145" font-weight="700">PaddleOCR-VL-1.5</text>
    <text x="236" y="145">PaddleOCR-VL</text>
    <text x="410" y="145">PP-OCRv5</text>
    <text x="545" y="145">PP-StructureV3</text>
  </g>
  <rect x="30" y="157" width="178" height="4" rx="2" fill="#4f46e5"/>

  <rect x="30" y="180" width="498" height="150" rx="12" fill="url(#panel)"/>
  <text x="54" y="220" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#334155">今日调用解析页数</text>
  <circle cx="215" cy="215" r="8" fill="none" stroke="#94a3b8"/>
  <text x="212" y="220" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">i</text>
  <text x="412" y="220" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#2563eb">申请更多页数</text>
  <rect x="54" y="256" width="452" height="7" rx="3.5" fill="#dbe4f3"/>
  <rect x="54" y="256" width="22" height="7" rx="3.5" fill="#60a5fa"/>
  <text x="54" y="315" font-family="Arial, sans-serif" font-size="21" fill="#334155">5 / 20,000</text>

  <rect x="545" y="180" width="498" height="150" rx="12" fill="url(#panel)"/>
  <text x="568" y="220" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#334155">API调用须知</text>
  <text x="568" y="258" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">1. 每个模型达到当日解析上限后，超出将返回429错误。</text>
  <text x="568" y="290" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748b">2. 单个文件大小无限制，但为避免处理超时请控制在100页内。</text>
  <text x="956" y="220" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#2563eb">更多说明</text>

  <rect x="30" y="344" width="1013" height="44" rx="9" fill="#eaf2ff"/>
  <text x="54" y="372" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#2563eb">若需企业级定制化服务调用，可前往百度智能云选购文档解析服务。</text>

  <rect x="30" y="405" width="1013" height="320" rx="12" fill="#f4f7ff" filter="url(#shadow)"/>
  <rect x="30" y="405" width="1013" height="64" rx="12" fill="#eef3ff"/>
  <rect x="42" y="419" width="112" height="34" rx="7" fill="#ffffff" stroke="#dbeafe"/>
  <text x="98" y="442" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#2563eb">异步解析</text>
  <text x="176" y="442" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">同步解析</text>
  <rect x="254" y="410" width="92" height="30" rx="7" fill="#ff5f57"/>
  <text x="300" y="431" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#ffffff">预计5.29下线</text>
  <text x="930" y="442" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#1f2937">复制代码</text>

  <g font-family="Consolas, 'Courier New', monospace" font-size="18">
    <text x="64" y="512" fill="#111827">import requests</text>
    <text x="64" y="544" fill="#111827">import sys</text>
    <text x="64" y="576" fill="#111827">import time</text>

    <text x="64" y="640" fill="#a21caf">JOB_URL</text>
    <text x="150" y="640" fill="#111827">=</text>
    <rect x="172" y="619" width="545" height="31" rx="6" fill="#ffffff" stroke="#93c5fd"/>
    <text x="184" y="641" fill="#15803d">"https://paddleocr.aistudio-app.com/api/v2/ocr/jobs"</text>

    <text x="64" y="674" fill="#a21caf">TOKEN</text>
    <text x="150" y="674" fill="#111827">=</text>
    <rect x="172" y="653" width="245" height="31" rx="6" fill="#111827"/>
    <text x="184" y="675" fill="#ffffff">"&lt;your-token&gt;"</text>

    <text x="64" y="708" fill="#a21caf">MODEL</text>
    <text x="150" y="708" fill="#111827">=</text>
    <text x="172" y="708" fill="#15803d">"PaddleOCR-VL-1.5"</text>
  </g>

  <path d="M344 438 C440 474, 512 542, 620 618" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <rect x="720" y="586" width="288" height="86" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
  <text x="864" y="618" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">复制异步解析代码</text>
  <text x="864" y="648" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#334155">从代码中取出 JOB_URL 和 TOKEN</text>

  <path d="M716 636 C806 604, 902 536, 936 456" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-red)"/>
  <rect x="743" y="478" width="260" height="76" rx="14" fill="#ffffff" stroke="#ef4444" stroke-width="3" filter="url(#shadow)"/>
  <text x="873" y="510" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" fill="#b91c1c">确认选中“异步解析”</text>
  <text x="873" y="537" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#334155">本项目使用 JOB_URL，不再使用旧 layout-parsing</text>
</svg>
